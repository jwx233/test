<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>月薪喵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            -webkit-user-select: none;
            user-select: none;
        }

        .mask {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #f6d365, #fda085);
            background-size: 400% 400%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            animation: gradientFlow 8s ease infinite;
            transition: all 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .main-text {
            font-size: 7vw;
            color: #fff;
            font-weight: 900;
            letter-spacing: 8px;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.5);
            animation: float 2.5s ease-in-out infinite;
        }

        .desc-text {
            font-size: 3.8vw;
            color: #fff;
            margin-top: 30px;
            opacity: 0.9;
            letter-spacing: 2px;
        }

        /* Loading 样式 + 旋转动画 */
        .loading {
            width: 12vw;
            height: 12vw;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        .cat-gif {
            position: absolute;
            top: 50%;
            left: 50%;
            max-width: 80vw;
            max-height: 80vh;
            transform: translate(-50%, -50%) scale(0.3) rotate(-15deg);
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        audio {
            display: none;
            preload: auto;
        }

        .mask.hide {
            opacity: 0;
            transform: translateY(-100%);
            pointer-events: none;
        }

        .cat-gif.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="mask" id="mask">
        <div class="main-text">点击变身</div>
        <div class="desc-text">轻点屏幕，开启趣味时刻 ✨</div>
        <!-- 加载动画 -->
        <div class="loading" id="loading"></div>
    </div>

    <img class="cat-gif" src="miao.gif" alt="月薪喵">
    <audio id="audio" src="yxm.MP3" loop preload="auto">

    <script>
        const mask = document.getElementById('mask');
        const catImg = document.querySelector('.cat-gif');
        const audio = document.getElementById('audio');
        const loading = document.getElementById('loading');

        // 标记资源是否全部加载完成
        let resourceLoaded = false;
        let imgLoaded = false;
        let audioLoaded = false;

        // 检查所有资源是否就绪
        function checkAllLoaded() {
            if (imgLoaded && audioLoaded) {
                resourceLoaded = true;
            }
        }

        // 监听图片加载完成
        catImg.onload = function () {
            imgLoaded = true;
            checkAllLoaded();
        };
        // 容错：图片缓存后不走onload，手动标记
        if (catImg.complete) {
            imgLoaded = true;
            checkAllLoaded();
        }

        // 监听音频加载完成
        audio.addEventListener('canplaythrough', function () {
            audioLoaded = true;
            checkAllLoaded();
        });

        // 点击幕布事件
        mask.addEventListener('click', () => {
            // 资源未加载完成：显示loading
            if (!resourceLoaded) {
                loading.style.display = 'block';
                return;
            }
            // 资源加载完毕：正常执行变身动画 + 播放音乐
            mask.classList.add('hide');
            catImg.classList.add('show');
            audio.play();

            setTimeout(() => {
                mask.style.display = 'none';
            }, 1200);
        });
    </script>
</body>
</html>
