<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>月薪喵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            -webkit-user-select: none;
            user-select: none;
        }

        .mask {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #f6d365, #fda085);
            background-size: 400% 400%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            animation: gradientFlow 8s ease infinite;
            transition: all 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .main-text {
            font-size: 7vw;
            color: #fff;
            font-weight: 900;
            letter-spacing: 8px;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.5);
            animation: float 2.5s ease-in-out infinite;
        }

        .desc-text {
            font-size: 3.8vw;
            color: #fff;
            margin-top: 30px;
            opacity: 0.9;
            letter-spacing: 2px;
        }

        .loading {
            width: 14vw;
            height: 14vw;
            margin-top: 40px;
            border: 5px solid rgba(255, 255, 255, 0.25);
            border-top: 5px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        .cat-gif {
            position: absolute;
            top: 50%;
            left: 50%;
            max-width: 80vw;
            max-height: 80vh;
            transform: translate(-50%, -50%) scale(0.3) rotate(-15deg);
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        audio {
            display: none;
            preload: auto;
        }

        .mask.hide {
            opacity: 0;
            transform: translateY(-100%);
            pointer-events: none;
        }

        .cat-gif.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="mask" id="mask">
        <div class="main-text">点击变身</div>
        <div class="desc-text">轻点屏幕，开启趣味时刻 ✨</div>
        <div class="loading" id="loading"></div>
    </div>

    <!-- 页面载入自动预加载GIF -->
    <img class="cat-gif" id="catImg" src="miao.gif" alt="月薪喵">
    <!-- 页面载入自动预加载音频，初始不播放 -->
    <audio id="audio" src="yxm.MP3" loop preload="auto">

    <script>
        const mask = document.getElementById('mask');
        const catImg = document.getElementById('catImg');
        const audio = document.getElementById('audio');
        const loading = document.getElementById('loading');

        let isDone = false;
        let timer = null;

        // 统一入口：进入主界面 + 播放音乐
        function goMain() {
            if (isDone) return;
            isDone = true;
            clearTimeout(timer);

            loading.style.display = 'none';
            mask.classList.add('hide');
            catImg.classList.add('show');

            // GIF加载完成后 才播放音频
            audio.play().catch(() => {});

            setTimeout(() => {
                mask.style.display = 'none';
            }, 1200);
        }

        // 点击触发Loading
        mask.addEventListener('click', () => {
            if (isDone) return;
            loading.style.display = 'block';

            // 判定当前GIF是否已经加载完成
            if (catImg.complete && catImg.naturalHeight > 0) {
                goMain();
            } else {
                // 监听GIF加载完成
                catImg.onload = goMain;
                // 加载失败也正常进入
                catImg.onerror = goMain;
            }

            // 6秒超时兜底，杜绝无限Loading
            timer = setTimeout(goMain, 6000);
        });
    </script>
</body>
</html>
